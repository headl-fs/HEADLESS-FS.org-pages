<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 1024">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#fff"/>
    </marker>
  </defs>

  <!-- Kurve 1: Cyan, durchgezogen -->
  <path d="M -30,1024 C 100,820 200,600 300,420 C 400,240 520,120 800,10"
        fill="none" stroke="#57b5c5" stroke-width="1.8" stroke-opacity="0.45"/>
  <!-- Kurve 2: Orange, gestrichelt -->
  <path d="M -30,1024 C 140,860 280,660 400,480 C 520,300 650,180 820,80"
        fill="none" stroke="#e87626" stroke-width="1.8" stroke-opacity="0.35"
        stroke-dasharray="8,10"/>
  <!-- Kurve 3: Cyan, gepunktet -->
  <path d="M -30,920 C 80,760 200,560 360,400 C 520,240 670,140 820,80"
        fill="none" stroke="#57b5c5" stroke-width="1.2" stroke-opacity="0.3"
        stroke-dasharray="3,8"/>

  <!-- Flowchart, goldener Schnitt x=475 -->
  <g transform="translate(475,500) scale(0.8)" opacity="0.65">
    <!-- Start -->
    <rect x="-75" y="-130" width="150" height="40" rx="10" fill="#ffb580" stroke="#fff" stroke-width="2"/>
    <text x="0" y="-104" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">Start</text>
    <!-- Arrow Start→Process 1 -->
    <line x1="0" y1="-90" x2="0" y2="-70" stroke="#fff" stroke-width="2" marker-end="url(#ah)"/>
    <!-- Process 1 -->
    <rect x="-75" y="-70" width="150" height="40" fill="#ddd" stroke="#fff" stroke-width="2"/>
    <text x="0" y="-44" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">Process 1</text>
    <!-- Fork arrows -->
    <line x1="-30" y1="-30" x2="-80" y2="20" stroke="#fff" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="30" y1="-30" x2="80" y2="20" stroke="#fff" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ah)"/>
    <!-- Process 2 -->
    <rect x="-145" y="20" width="130" height="40" fill="#ddd" stroke="#fff" stroke-width="2"/>
    <text x="-80" y="46" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">Process 2</text>
    <!-- Process 3 -->
    <rect x="15" y="20" width="130" height="40" fill="#aad2d6" stroke="#fff" stroke-width="2"/>
    <text x="80" y="46" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#555">Process 3</text>
    <!-- Converge arrows -->
    <line x1="-80" y1="60" x2="-20" y2="100" stroke="#fff" stroke-width="2" marker-end="url(#ah)"/>
    <line x1="80" y1="60" x2="20" y2="100" stroke="#fff" stroke-width="2" marker-end="url(#ah)"/>
    <!-- End -->
    <rect x="-75" y="100" width="150" height="40" rx="10" fill="#d6a9cf" stroke="#fff" stroke-width="2"/>
    <text x="0" y="126" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#555">End</text>
  </g>
</svg>
